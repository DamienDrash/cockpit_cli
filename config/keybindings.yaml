bindings:
  - key: ctrl+k
    action: palette.open
  - key: ctrl+1
    action: tab.focus.work
  - key: ctrl+2
    action: tab.focus.git
  - key: ctrl+3
    action: tab.focus.logs
  - key: ctrl+4
    action: tab.focus.docker
  - key: ctrl+5
    action: tab.focus.cron
  - key: ctrl+r
    action: terminal.restart
  - key: ctrl+t
    action: terminal.focus
  - key: f8
    action: docker.restart
