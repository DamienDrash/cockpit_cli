bindings:
  - key: ctrl+k
    action: palette.open
  - key: ctrl+1
    action: tab.focus.work
  - key: ctrl+2
    action: tab.focus.git
  - key: ctrl+3
    action: tab.focus.logs
  - key: ctrl+4
    action: tab.focus.docker
  - key: ctrl+5
    action: tab.focus.cron
  - key: ctrl+6
    action: tab.focus.db
  - key: ctrl+7
    action: tab.focus.curl
  - key: ctrl+r
    action: terminal.restart
  - key: ctrl+alt+c
    action: terminal.copy
  - key: ctrl+shift+c
    action: terminal.copy_selection
  - key: ctrl+]
    action: panel.focus_next
  - key: ctrl+t
    action: terminal.focus
  - key: ctrl+alt+o
    action: layout.toggle_orientation
  - key: ctrl+alt+=
    action: layout.grow
  - key: ctrl+alt+-
    action: layout.shrink
  - key: f8
    action: docker.restart
  - key: f9
    action: docker.stop
  - key: f10
    action: docker.remove
