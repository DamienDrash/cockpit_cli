name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,all-datasources-pure]

      - name: Compile
        run: python -m compileall src tests

      - name: Run smoke tests
        run: |
          chmod +x scripts/smoke_test.sh
          PYTHONPATH=src ./scripts/smoke_test.sh

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Build packages
        run: python -m build

  release-dry-run:
    runs-on: ubuntu-latest
    needs:
      - test
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/layout-editor/package-lock.json

      - name: Install Python release tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .[release]

      - name: Install frontend dependencies
        working-directory: web/layout-editor
        run: npm ci

      - name: Run frontend tests
        working-directory: web/layout-editor
        run: npm test

      - name: Build frontend bundle
        working-directory: web/layout-editor
        run: npm run build

      - name: Sync packaged frontend assets
        run: python scripts/release_tooling.py sync-layout-editor

      - name: Build Python artifacts
        run: python -m build

      - name: Assemble release dist payload
        run: |
          mkdir -p release-assets/dist release-assets/sbom
          cp dist/*.tar.gz dist/*.whl release-assets/dist/

      - name: Create Python SBOM environment
        run: |
          python -m venv .sbom-venv
          .sbom-venv/bin/python -m pip install --upgrade pip
          .sbom-venv/bin/pip install release-assets/dist/*.whl

      - name: Generate Python SBOM
        run: .sbom-venv/bin/python -m pip freeze --all | cyclonedx-py requirements - --pyproject pyproject.toml --output-reproducible --of JSON -o release-assets/sbom/cockpit-python-runtime.cdx.json

      - name: Generate frontend SBOM
        working-directory: web/layout-editor
        run: npm exec -- cyclonedx-npm --output-format JSON --output-file ../../release-assets/sbom/cockpit-frontend.cdx.json

      - name: Write release manifest
        run: python scripts/release_tooling.py manifest --root release-assets --output release-assets/release-manifest.json --version "${GITHUB_REF_NAME#v}" --git-ref "${GITHUB_REF:-refs/heads/${GITHUB_HEAD_REF:-main}}" --workflow-ref "${GITHUB_WORKFLOW_REF}"

      - name: Write release checksums
        run: python scripts/release_tooling.py checksums --root release-assets --output release-assets/SHA256SUMS.txt

      - name: Upload dry-run release bundle
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-release-dry-run
          path: release-assets

  service-matrix:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: cockpit
          POSTGRES_DB: cockpit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cockpit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: cockpit
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      COCKPIT_LIVE_SERVICES: "1"
      COCKPIT_TEST_POSTGRES_URL: postgresql+psycopg://postgres:cockpit@127.0.0.1:5432/cockpit
      COCKPIT_TEST_MYSQL_URL: mysql+pymysql://root@127.0.0.1:3306/cockpit
      COCKPIT_TEST_REDIS_URL: redis://127.0.0.1:6379/0
      COCKPIT_TEST_MONGODB_URL: mongodb://127.0.0.1:27017/admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with live backend extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,postgres,mysql,redis,mongo]

      - name: Run live datasource integration tests
        run: PYTHONPATH=src python -m unittest tests.integration.test_datasource_live_backends -v
